<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a0026, #400040);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            z-index: 2;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 12px;
            font-size: 16px;
            width: 100%;
            max-width: 260px;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 20px;
            border: none;
            background-color: #ff66b2;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #ff3385;
        }

        .rose {
            font-size: 70px;
            opacity: 0;
            transform: scale(0);
        }

        .bloom {
            animation: bloom 1.5s ease forwards;
        }

        @keyframes bloom {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); }
        }

        .message {
            margin-top: 20px;
            font-size: 20px;
            line-height: 1.6;
            min-height: 80px;
        }

        .petal {
            position: absolute;
            top: -50px;
            font-size: 18px;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .music-indicator {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="container" id="passwordScreen">
    <h2>Enter the secret 💖</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<div class="container" id="mainContent" style="display:none;">
    <button onclick="revealLove()">Click Me 🌹</button>
    <div class="rose" id="topRose">🌹</div>
    <div class="message" id="message"></div>
    <div class="rose" id="bottomRose">🌹</div>
    <div class="music-indicator" id="musicText"></div>
</div>

<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/10/30/audio_c8c8a73467.mp3?filename=romantic-jazz-124008.mp3" type="audio/mpeg">
</audio>

<script>
    const correctPassword = "Vasvi";

    function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        if (input.toLowerCase() === correctPassword.toLowerCase()) {
            document.getElementById("passwordScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "flex";
        } else {
            alert("Wrong password 😢");
        }
    }

    function revealLove() {
        startMusic();

        const topRose = document.getElementById("topRose");
        const bottomRose = document.getElementById("bottomRose");

        topRose.classList.add("bloom");

        const text = "Vas, talking to you is the cutest part of my day. You make everything brighter and softer and happier. 💕";
        let i = 0;
        const speed = 40;
        const messageBox = document.getElementById("message");
        messageBox.innerHTML = "";

        function typeWriter() {
            if (i < text.length) {
                messageBox.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            } else {
                bottomRose.classList.add("bloom");
            }
        }

        typeWriter();
        startPetals();
    }

    function startPetals() {
        setInterval(createPetal, 600);
    }

    function createPetal() {
        const petal = document.createElement("div");
        petal.classList.add("petal");
        petal.innerHTML = "🌸";

        petal.style.left = Math.random() * window.innerWidth + "px";
        petal.style.animationDuration = (4 + Math.random() * 3) + "s";

        document.body.appendChild(petal);

        setTimeout(() => {
            petal.remove();
        }, 7000);
    }

    function startMusic() {
        const music = document.getElementById("bgMusic");
        const musicText = document.getElementById("musicText");

        music.play().then(() => {
            music.volume = 0.4;
            musicText.innerHTML = "🎵 Soft jazz playing";
        }).catch(() => {
            musicText.innerHTML = "🎵 Tap again if music doesn't start";
        });
    }
</script>

</body>
</html>
