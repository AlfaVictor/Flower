<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a0026, #400040);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 12px;
            font-size: 16px;
            width: 100%;
            max-width: 260px;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 20px;
            border: none;
            background-color: #ff66b2;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #ff3385;
        }

        .message {
            margin-top: 25px;
            font-size: 20px;
            line-height: 1.6;
            min-height: 80px;
        }

        /* Elegant SVG Rose */
        .rose-svg {
            margin-top: 30px;
            width: 150px;
            stroke: #ff4d88;
            stroke-width: 2;
            fill: none;
            opacity: 0;
        }

        .draw {
            opacity: 1;
        }

        path {
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: draw 3s ease forwards;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Petals */
        .petal {
            position: absolute;
            top: -50px;
            font-size: 18px;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .music-toggle {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container" id="passwordScreen">
    <h2>Enter the secret 💖</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<div class="container" id="mainContent" style="display:none;">
    <button id="revealBtn" onclick="revealLove()">Click Me 🌹</button>

    <svg class="rose-svg" id="rose" viewBox="0 0 200 200">
        <path d="M100 40
                 C130 20, 160 50, 100 110
                 C40 50, 70 20, 100 40Z
                 M100 110
                 C90 140, 80 160, 100 180
                 C120 160, 110 140, 100 110Z" />
    </svg>

    <div class="message" id="message"></div>
    <div class="music-toggle" onclick="toggleMusic()">🎵 Music On/Off</div>
</div>

<audio id="bgMusic" loop>
    <source src="https://assets.mixkit.co/music/preview/mixkit-sweet-romantic-ambient-252.mp3" type="audio/mpeg">
</audio>

<script>
    const correctPassword = "Vasvi";
    let typing = false;
    let musicStarted = false;

    function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        if (input.toLowerCase() === correctPassword.toLowerCase()) {
            document.getElementById("passwordScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "flex";
        } else {
            alert("Wrong password 😢");
        }
    }

    function revealLove() {
        if (typing) return; // Prevent multiple clicks
        typing = true;

        startMusic();

        document.getElementById("revealBtn").disabled = true;

        const rose = document.getElementById("rose");
        rose.classList.add("draw");

        const text = "Vas, talking to you is the highlight of my day. You make everything softer, brighter, and happier. 💕";
        const messageBox = document.getElementById("message");

        let i = 0;
        messageBox.innerHTML = "";

        function typeWriter() {
            if (i < text.length) {
                messageBox.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 40);
            }
        }

        typeWriter();
        startPetals();
    }

    function startPetals() {
        setInterval(createPetal, 700);
    }

    function createPetal() {
        const petal = document.createElement("div");
        petal.classList.add("petal");
        petal.innerHTML = "🌸";
        petal.style.left = Math.random() * window.innerWidth + "px";
        petal.style.animationDuration = (4 + Math.random() * 3) + "s";
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 7000);
    }

    function startMusic() {
        if (musicStarted) return;
        const music = document.getElementById("bgMusic");
        music.volume = 0.4;
        music.play().catch(() => {});
        musicStarted = true;
    }

    function toggleMusic() {
        const music = document.getElementById("bgMusic");
        if (music.paused) {
            music.play();
        } else {
            music.pause();
        }
    }
</script>

</body>
</html>
