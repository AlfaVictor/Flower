<!DOCTYPE html>
<html>
<head>
    <title>For You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #2e2e2e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            transition: background 2s ease;
        }

        .romantic-bg {
            background: radial-gradient(circle at center,
                #3d003d 0%,
                #240024 40%,
                #120012 100%);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            z-index: 2;
        }

        h2 {
            font-weight: 400;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 12px;
            font-size: 16px;
            width: 100%;
            max-width: 260px;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background-color: #444;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #666;
        }

        .reveal-btn {
            background-color: #ff66b2;
        }

        .reveal-btn:hover {
            background-color: #ff3385;
        }

        .rose {
            margin-top: 35px;
            display: none;
            width: 70%;
            max-width: 320px;
            box-shadow: 0 0 50px rgba(255, 120, 180, 0.4);
        }

        .message {
            margin-top: 30px;
            font-size: 20px;
            line-height: 1.7;
            min-height: 120px;
        }

        .petal {
            position: absolute;
            top: -50px;
            font-size: 20px;
            animation: fall 9s linear forwards;
            opacity: 0.85;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.9;
            }
            50% {
                transform: translateY(50vh) rotate(180deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<div class="container" id="passwordScreen">
    <h2>Please enter password to enter</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>
</div>

<div class="container" id="mainContent" style="display:none;">
    <button id="revealBtn" class="reveal-btn" onclick="revealLove()">Click to reveal</button>

    <img class="rose" id="rose" src="rose.gif" alt="Blooming Rose">

    <div class="message" id="message"></div>
</div>

<script>
    const correctPassword = "Vasvi";
    let revealed = false;

    function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        if (input.toLowerCase() === correctPassword.toLowerCase()) {

            document.body.classList.add("romantic-bg");

            document.getElementById("passwordScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "flex";

        } else {
            alert("Incorrect password");
        }
    }

    function revealLove() {
        if (revealed) return;
        revealed = true;

        document.getElementById("revealBtn").style.display = "none";

        const rose = document.getElementById("rose");
        rose.style.display = "block";

        const text = "Vas, talking to you is the cutest part of my day. Here is a little virtual rose for you so that you do not feel too low. Best of luck with applying to jobs, let us not allow current situations to make you doubt yourself. You are far more capable than you sometimes give yourself credit for.";

        const messageBox = document.getElementById("message");

        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                messageBox.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 35);
            }
        }

        typeWriter();
        startPetals();
    }

    function startPetals() {
        setInterval(createPetal, 900);
    }

    function createPetal() {
        const petal = document.createElement("div");
        petal.classList.add("petal");
        petal.innerHTML = "🌸";
        petal.style.left = Math.random() * window.innerWidth + "px";
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 9000);
    }
</script>

</body>
</html>
