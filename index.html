<!DOCTYPE html>
<html>
<head>
    <title>For You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #2e2e2e; /* Neutral start */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        .romantic-bg {
            background: linear-gradient(to bottom, #1a0026, #400040);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            z-index: 2;
        }

        input {
            padding: 12px;
            border-radius: 6px;
            border: none;
            margin-bottom: 12px;
            font-size: 16px;
            width: 100%;
            max-width: 260px;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            background-color: #444;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #666;
        }

        .reveal-btn {
            background-color: #ff66b2;
        }

        .reveal-btn:hover {
            background-color: #ff3385;
        }

        .message {
            margin-top: 25px;
            font-size: 20px;
            line-height: 1.6;
            min-height: 90px;
        }

        .rose {
            margin-top: 30px;
            display: none;
            width: 180px;
        }

        /* Petals */
        .petal {
            position: absolute;
            top: -50px;
            font-size: 18px;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<div class="container" id="passwordScreen">
    <h2>Please enter password to enter</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>
</div>

<div class="container" id="mainContent" style="display:none;">
    <button id="revealBtn" class="reveal-btn" onclick="revealLove()">Click to reveal</button>

    <img class="rose" id="rose"
         src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif"
         alt="Blooming Rose">

    <div class="message" id="message"></div>
</div>

<script>
    const correctPassword = "Vasvi";
    let revealed = false;

    function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        if (input.toLowerCase() === correctPassword.toLowerCase()) {

            // Switch background
            document.body.classList.add("romantic-bg");

            document.getElementById("passwordScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "flex";

        } else {
            alert("Incorrect password");
        }
    }

    function revealLove() {
        if (revealed) return;
        revealed = true;

        document.getElementById("revealBtn").style.display = "none";

        const rose = document.getElementById("rose");
        rose.style.display = "block";

        const text = "Vas talking to you is the cutest part of my day. Heres a little virtual rose for you so that you do not feel too low. Best of luck for applying to jobs :).";
        const messageBox = document.getElementById("message");

        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                messageBox.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 40);
            }
        }

        typeWriter();
        startPetals();
    }

    function startPetals() {
        setInterval(createPetal, 700);
    }

    function createPetal() {
        const petal = document.createElement("div");
        petal.classList.add("petal");
        petal.innerHTML = "🌸";
        petal.style.left = Math.random() * window.innerWidth + "px";
        petal.style.animationDuration = (4 + Math.random() * 3) + "s";
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 7000);
    }
</script>

</body>
</html>
