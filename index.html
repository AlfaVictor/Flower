<!DOCTYPE html>
<html>
<head>
    <title>For You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #2e2e2e; /* dull neutral background */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        input {
            padding: 12px;
            border-radius: 6px;
            border: none;
            margin-bottom: 12px;
            font-size: 16px;
            width: 100%;
            max-width: 260px;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            background-color: #444;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #666;
        }

        .message {
            margin-top: 20px;
            font-size: 20px;
            line-height: 1.6;
            min-height: 80px;
        }

        .rose {
            margin-top: 30px;
            display: none;
            width: 180px;
        }
    </style>
</head>

<body>

<div class="container" id="passwordScreen">
    <h2>Please enter password to enter</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>
</div>

<div class="container" id="mainContent" style="display:none;">
    <button id="revealBtn" onclick="revealLove()">Click to reveal</button>

    <!-- External blooming rose GIF -->
    <img class="rose" id="rose"
         src="https://media.giphy.com/media/3o7TKMt1VVNkHV2PaE/giphy.gif"
         alt="Blooming Rose">

    <div class="message" id="message"></div>
</div>

<script>
    const correctPassword = "Vasvi";
    let revealed = false;

    function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        if (input.toLowerCase() === correctPassword.toLowerCase()) {
            document.getElementById("passwordScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "flex";
        } else {
            alert("Incorrect password");
        }
    }

    function revealLove() {
        if (revealed) return; // limit to one click
        revealed = true;

        const btn = document.getElementById("revealBtn");
        btn.style.display = "none";

        const rose = document.getElementById("rose");
        rose.style.display = "block";

        const text = "Vas, talking to you is the highlight of my day. You make everything feel lighter and calmer.";
        const messageBox = document.getElementById("message");

        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                messageBox.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 40);
            }
        }

        typeWriter();
    }
</script>

</body>
</html>
