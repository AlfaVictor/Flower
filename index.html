<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #0f001a, #330033);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #ff4d88;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #ff1a66;
        }

        .rose {
            margin-top: 20px;
            opacity: 0;
            transform: scale(0);
            transition: all 1s ease;
            filter: drop-shadow(0 0 20px #ff4d88);
        }

        .showRose {
            opacity: 1;
            transform: scale(1);
        }

        .message {
            margin-top: 20px;
            font-size: 24px;
            min-height: 60px;
            max-width: 500px;
        }

        /* Falling petals */
        .petal {
            position: absolute;
            top: -50px;
            font-size: 24px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<div class="container" id="passwordScreen">
    <h2>Enter the secret ❤️</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<div class="container" id="mainContent" style="display:none;">
    <button onclick="revealLove()">Click Me 🌹</button>

    <div class="rose" id="rose">
        <svg viewBox="0 0 200 200" width="150">
            <path fill="#ff3366" d="M100 30
              C130 0, 180 40, 100 120
              C20 40, 70 0, 100 30Z"/>
        </svg>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
    const correctPassword = "Vasvi";

    function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        if (input.toLowerCase() === correctPassword.toLowerCase()) {
            document.getElementById("passwordScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "flex";
        } else {
            alert("Wrong password 😢");
        }
    }

    function revealLove() {
        const rose = document.getElementById("rose");
        rose.classList.add("showRose");

        const text = "Vas, talking to you is generally the highlight of the day for me. You make ordinary days feel extraordinary. ❤️";
        let i = 0;
        const speed = 50;

        const messageBox = document.getElementById("message");
        messageBox.innerHTML = "";

        function typeWriter() {
            if (i < text.length) {
                messageBox.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        typeWriter();
        startPetals();
    }

    function startPetals() {
        setInterval(createPetal, 300);
    }

    function createPetal() {
        const petal = document.createElement("div");
        petal.classList.add("petal");
        petal.innerHTML = "🌸";

        petal.style.left = Math.random() * window.innerWidth + "px";
        petal.style.animationDuration = (3 + Math.random() * 3) + "s";

        document.body.appendChild(petal);

        setTimeout(() => {
            petal.remove();
        }, 6000);
    }
</script>

</body>
</html>
