<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #0f001a, #330033);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #ff4d88;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #ff1a66;
        }

        .rose {
            font-size: 120px;
            opacity: 0;
            transform: scale(0);
            transition: all 1s ease;
        }

        .showRose {
            opacity: 1;
            transform: scale(1);
        }

        .message {
            margin-top: 20px;
            font-size: 24px;
            min-height: 60px;
        }
    </style>
</head>

<body>

<div class="container" id="passwordScreen">
    <h2>Enter the secret ❤️</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<div class="container" id="mainContent" style="display:none;">
    <button onclick="revealLove()">Click Me 🌹</button>
    <div class="rose" id="rose">🌹</div>
    <div class="message" id="message"></div>
</div>

<script>
    const correctPassword = "Vasvi"; 

    function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        if (input === correctPassword) {
            document.getElementById("passwordScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "flex";
        } else {
            alert("Wrong password 😢");
        }
    }

    function revealLove() {
        const rose = document.getElementById("rose");
        rose.classList.add("showRose");

        const text = "Vas, talking to you is generally the highlight of the day for me. ❤️";
        let i = 0;
        const speed = 50;

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("message").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        typeWriter();
    }
</script>

</body>
</html>
