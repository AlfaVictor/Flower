<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0f001a, #330033);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            z-index: 2;
        }

        h2 {
            font-weight: 400;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 12px;
            font-size: 16px;
            width: 100%;
            max-width: 280px;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background-color: #ff4d88;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #ff1a66;
        }

        .rose {
            margin-top: 30px;
            opacity: 0;
            transform: scale(0);
            transition: all 1s ease;
            filter: drop-shadow(0 0 20px #ff4d88);
        }

        .showRose {
            opacity: 1;
            transform: scale(1);
        }

        .message {
            margin-top: 25px;
            font-size: 20px;
            line-height: 1.6;
            min-height: 80px;
        }

        /* Petals */
        .petal {
            position: absolute;
            top: -50px;
            font-size: 20px;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Subtle background glow */
        .background-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,77,136,0.3), transparent);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.3); opacity: 0.8; }
        }
    </style>
</head>

<body>

<div class="background-glow"></div>

<div class="container" id="passwordScreen">
    <h2>Enter the secret ❤️</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<div class="container" id="mainContent" style="display:none;">
    <button onclick="revealLove()">Click Me 🌹</button>

    <div class="rose" id="rose">
        <svg viewBox="0 0 200 200" width="140">
            <path fill="#ff3366" d="M100 30
              C130 0, 180 40, 100 120
              C20 40, 70 0, 100 30Z"/>
        </svg>
    </div>

    <div class="message" id="message"></div>
</div>

<!-- Background Jazz -->
<audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6f3bbf5d3e.mp3?filename=smooth-jazz-10970.mp3" type="audio/mpeg">
</audio>

<script>
    const correctPassword = "Vasvi";

    function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        if (input.toLowerCase() === correctPassword.toLowerCase()) {
            document.getElementById("passwordScreen").style.display = "none";
            document.getElementById("mainContent").style.display = "flex";
            startMusic();
        } else {
            alert("Wrong password 😢");
        }
    }

    function revealLove() {
        const rose = document.getElementById("rose");
        rose.classList.add("showRose");

        const text = "Vas, talking to you is generally the highlight of the day for me. You make ordinary days feel extraordinary. ❤️";
        let i = 0;
        const speed = 40;
        const messageBox = document.getElementById("message");
        messageBox.innerHTML = "";

        function typeWriter() {
            if (i < text.length) {
                messageBox.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        typeWriter();
        startPetals();
    }

    function startPetals() {
        setInterval(createPetal, 500);
    }

    function createPetal() {
        const petal = document.createElement("div");
        petal.classList.add("petal");
        petal.innerHTML = "🌸";

        petal.style.left = Math.random() * window.innerWidth + "px";
        petal.style.animationDuration = (4 + Math.random() * 3) + "s";

        document.body.appendChild(petal);

        setTimeout(() => {
            petal.remove();
        }, 7000);
    }

    function startMusic() {
        const music = document.getElementById("bgMusic");
        music.volume = 0;
        music.play();

        // Smooth fade-in
        let vol = 0;
        const fade = setInterval(() => {
            if (vol < 0.5) {
                vol += 0.02;
                music.volume = vol;
            } else {
                clearInterval(fade);
            }
        }, 200);
    }
</script>

</body>
</html>
